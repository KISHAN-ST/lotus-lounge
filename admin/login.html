<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Lotus Lounge</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body class="login-page">
  <section class="login-card">
    <p class="login-title">Lotus Lounge</p>
    <p class="login-subtitle">Admin Panel</p>

    <form id="login-form" novalidate>
      <div class="float-field">
        <input id="email" type="email" placeholder=" " required>
        <label for="email">Email</label>
      </div>

      <div class="float-field password-wrap">
        <input id="password" type="password" placeholder=" " required>
        <label for="password">Password</label>
        <button type="button" class="password-toggle" id="toggle-password">Show</button>
      </div>

      <p id="login-error" class="error-text"></p>
      <button id="login-btn" class="btn btn-gold" style="width:100%;" type="submit">Login</button>
    </form>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <script>
    console.log('SUPABASE URL:', SUPABASE_URL);

    const supabase = window.supabaseClient;
    const form = document.getElementById('login-form');
    const errorText = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');
    const password = document.getElementById('password');
    const toggle = document.getElementById('toggle-password');

    toggle.addEventListener('click', () => {
      const show = password.type === 'password';
      password.type = show ? 'text' : 'password';
      toggle.textContent = show ? 'Hide' : 'Show';
    });

    async function login() {
      errorText.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Logging in...';

      const email = document.querySelector('input[type="email"]').value.trim();
      const pass = document.querySelector('input[type="password"]').value;

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password: pass
      });

      console.log('DATA:', data);
      console.log('ERROR:', error);

      if (error || !data?.user) {
        errorText.textContent = error?.message || 'Invalid credentials';
        alert(error?.message || 'Invalid credentials');
        btn.disabled = false;
        btn.textContent = 'Login';
        return;
      }

      alert('Login success');
      window.location.href = '/admin/dashboard.html';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      await login();
    });

    (async () => {
      const { data } = await supabase.auth.getUser();
      if (data?.user) {
        window.location.href = '/admin/dashboard.html';
      }
    })();
  </script>
</body>
</html>
