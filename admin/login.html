<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Lotus Lounge</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body class="login-page">
  <section class="login-card">
    <p class="login-title">Lotus Lounge</p>
    <p class="login-subtitle">Admin Panel</p>

    <form id="login-form" novalidate>
      <div class="float-field">
        <input id="email" type="email" placeholder=" " required>
        <label for="email">Email</label>
      </div>

      <div class="float-field password-wrap">
        <input id="password" type="password" placeholder=" " required>
        <label for="password">Password</label>
        <button type="button" class="password-toggle" id="toggle-password">Show</button>
      </div>

      <p id="login-error" class="error-text"></p>
      <button id="login-btn" class="btn btn-gold" style="width:100%;" type="submit">Login</button>
    </form>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <script>
    console.log('SUPABASE URL:', SUPABASE_URL);

    const sb = window.supabaseClient;
    const form = document.getElementById('login-form');
    const errorText = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');
    const password = document.getElementById('password');
    const toggle = document.getElementById('toggle-password');

    toggle.addEventListener('click', () => {
      const show = password.type === 'password';
      password.type = show ? 'text' : 'password';
      toggle.textContent = show ? 'Hide' : 'Show';
    });

    function withTimeout(promise, ms) {
      let timer;
      return Promise.race([
        promise,
        new Promise((_, reject) => {
          timer = setTimeout(() => reject(new Error('Network timeout while contacting Supabase.')), ms);
        })
      ]).finally(() => clearTimeout(timer));
    }

    async function login() {
      errorText.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Logging in...';

      const email = document.getElementById('email').value.trim();
      const pass = document.getElementById('password').value;

      if (!sb?.auth) {
        const msg = 'Supabase client not initialized. Please refresh and try again.';
        console.log('ERROR:', msg);
        errorText.textContent = msg;
        alert(msg);
        btn.disabled = false;
        btn.textContent = 'Login';
        return;
      }

      try {
        const { data, error } = await withTimeout(
          sb.auth.signInWithPassword({
            email,
            password: pass
          }),
          12000
        );

        console.log('DATA:', data);
        console.log('ERROR:', error);

        if (error || !data?.user) {
          errorText.textContent = error?.message || 'Invalid credentials';
          alert(error?.message || 'Invalid credentials');
          return;
        }

        alert('Login success');
        window.location.href = '/admin/dashboard.html';
      } catch (err) {
        const message = err?.message || 'Login failed due to network error.';
        console.log('DATA:', null);
        console.log('ERROR:', err);
        errorText.textContent = message;
        alert(message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    }

    window.login = login;

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      await login();
    });

    (async () => {
      try {
        if (!sb?.auth) return;
        const { data } = await sb.auth.getUser();
        if (data?.user) {
          window.location.href = '/admin/dashboard.html';
        }
      } catch (err) {
        console.log('ERROR: getUser failed', err);
      }
    })();
  </script>
</body>
</html>
