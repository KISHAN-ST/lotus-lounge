<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Announcements | Lotus Lounge Admin</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="admin-shell">
    <aside class="sidebar">
      <p class="brand">Lotus Lounge</p>
      <nav class="nav-links">
        <a class="nav-item" data-nav href="/admin/dashboard.html">🏠 Dashboard</a>
        <a class="nav-item" data-nav href="/admin/menu.html">🍽️ Menu</a>
        <a class="nav-item" data-nav href="/admin/reservations.html">📅 Reservations</a>
        <a class="nav-item" data-nav href="/admin/reviews.html">⭐ Reviews</a>
        <a class="nav-item" data-nav href="/admin/announcements.html">📢 Announcements</a>
        <a class="nav-item" href="#" data-logout>🚪 Logout</a>
      </nav>
      <div class="sidebar-footer">Logged in as<br><span data-user-email>...</span></div>
    </aside>

    <main class="main">
      <div class="top-row">
        <button class="hamburger" data-sidebar-toggle>☰</button>
        <h1>Announcements</h1>
      </div>

      <section class="surface">
        <form id="announcement-form" class="top-row" style="align-items:flex-end;">
          <div class="field" style="flex:1; margin:0;"><label>Message</label><input id="announcement-message" placeholder="🎵 Live Music this Friday — Book your table now!" required></div>
          <button class="btn btn-gold" type="submit" id="add-announcement">Add</button>
        </form>
      </section>

      <section class="surface">
        <h2 style="font-size:1rem;margin-bottom:0.7rem;">Active banner preview</h2>
        <div id="banner-preview" style="padding:0.7rem;border-radius:0.5rem;background:var(--gold);color:#231a07;">No active announcement</div>
      </section>

      <section class="surface">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Message</th><th>Active</th><th>Actions</th></tr></thead>
            <tbody id="announcement-table"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js?v=20260410a"></script>
  <script src="./auth.js"></script>
  <script>
    let rows = [];

    async function fetchRows() {
      const { data, error } = await window.AdminAuth.supabase.from('announcements').select('*').order('id', { ascending: false });
      if (error) return window.AdminAuth.toast(error.message, 'error', false);
      rows = data || [];
      render();
    }

    function render() {
      const tbody = document.getElementById('announcement-table');
      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="3" class="empty">📭 No data yet</td></tr>';
      } else {
        tbody.innerHTML = rows.map((r) =>
          '<tr>' +
          '<td>' + (r.message || '-') + '</td>' +
          '<td><button class="switch ' + (r.is_active ? 'active' : '') + '" data-active="' + r.id + '"></button></td>' +
          '<td><button class="btn-icon" data-delete="' + r.id + '">🗑</button></td>' +
          '</tr>'
        ).join('');
      }

      const active = rows.find((r) => r.is_active);
      document.getElementById('banner-preview').textContent = active ? active.message : 'No active announcement';

      tbody.querySelectorAll('[data-active]').forEach((el) => {
        el.addEventListener('click', () => setActive(el.dataset.active));
      });

      tbody.querySelectorAll('[data-delete]').forEach((el) => {
        el.addEventListener('click', () => deleteRow(el.dataset.delete));
      });
    }

    async function setActive(id) {
      const { error: resetErr } = await window.AdminAuth.supabase.from('announcements').update({ is_active: false }).neq('id', 0);
      if (resetErr) return window.AdminAuth.toast(resetErr.message, 'error', false);

      const row = rows.find((r) => String(r.id) === String(id));
      const next = row ? !row.is_active : true;
      const { error } = await window.AdminAuth.supabase.from('announcements').update({ is_active: next }).eq('id', id);
      if (error) return window.AdminAuth.toast(error.message, 'error', false);

      await fetchRows();
      window.AdminAuth.toast('Active announcement updated');
    }

    async function deleteRow(id) {
      if (!window.AdminAuth.confirmDanger()) return;
      const { error } = await window.AdminAuth.supabase.from('announcements').delete().eq('id', id);
      if (error) return window.AdminAuth.toast(error.message, 'error', false);
      await fetchRows();
      window.AdminAuth.toast('Announcement deleted');
    }

    async function addRow(e) {
      e.preventDefault();
      const input = document.getElementById('announcement-message');
      const message = input.value.trim();
      if (!message) return;

      const { error } = await window.AdminAuth.supabase.from('announcements').insert({ message, is_active: false });
      if (error) return window.AdminAuth.toast(error.message, 'error', false);

      input.value = '';
      window.AdminAuth.toast('Announcement added');
      await fetchRows();
    }

    window.addEventListener('DOMContentLoaded', async () => {
      await window.AdminAuth.requireAuth();
      document.getElementById('announcement-form').addEventListener('submit', addRow);
      await fetchRows();
    });
  </script>
</body>
</html>
