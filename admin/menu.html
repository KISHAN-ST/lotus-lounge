<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Management | Lotus Lounge Admin</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="admin-shell">
    <aside class="sidebar">
      <p class="brand">Lotus Lounge</p>
      <nav class="nav-links">
        <a class="nav-item" data-nav href="/admin/dashboard.html">🏠 Dashboard</a>
        <a class="nav-item" data-nav href="/admin/menu.html">🍽️ Menu</a>
        <a class="nav-item" data-nav href="/admin/reservations.html">📅 Reservations</a>
        <a class="nav-item" data-nav href="/admin/reviews.html">⭐ Reviews</a>
        <a class="nav-item" data-nav href="/admin/announcements.html">📢 Announcements</a>
        <a class="nav-item" href="#" data-logout>🚪 Logout</a>
      </nav>
      <div class="sidebar-footer">Logged in as<br><span data-user-email>...</span></div>
    </aside>

    <main class="main">
      <div class="top-row">
        <button class="hamburger" data-sidebar-toggle>☰</button>
        <h1>Menu Management</h1>
        <button class="btn btn-gold" id="add-item">+ Add Item</button>
      </div>

      <div class="top-row">
        <div class="tabs" id="category-tabs"></div>
      </div>

      <section class="surface">
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Veg</th><th>Available</th><th>Actions</th></tr>
            </thead>
            <tbody id="menu-table"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <div class="modal" id="item-modal">
    <div class="modal-card">
      <div class="modal-head"><h2 id="modal-title" style="font-size:1.05rem;">Add Item</h2><button class="btn-icon" id="close-modal">✕</button></div>
      <form id="item-form">
        <input type="hidden" id="item-id">
        <div class="field"><label>Dish Name</label><input id="dish-name" required></div>
        <div class="field"><label>Category</label><select id="dish-category" required>
          <option>North Indian</option><option>South Indian</option><option>Seafood</option><option>Starters</option><option>Desserts</option><option>Cocktails</option><option>Mocktails</option><option>Bar</option>
        </select></div>
        <div class="field"><label>Price</label><input id="dish-price" type="number" min="0" step="1" required></div>
        <div class="field"><label>Description</label><textarea id="dish-description"></textarea></div>
        <div class="field"><label>Image Upload</label><input id="dish-image" type="file" accept="image/*"></div>
        <div class="top-row" style="margin-bottom:0.6rem;">
          <label>Is Vegetarian</label><button type="button" class="switch" data-toggle="is-veg"></button>
        </div>
        <div class="top-row" style="margin-bottom:0.6rem;">
          <label>Chef's Special</label><button type="button" class="switch" data-toggle="is-chef"></button>
        </div>
        <div class="top-row" style="margin-bottom:0.6rem;">
          <label>Is Available</label><button type="button" class="switch active" data-toggle="is-available"></button>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn" id="cancel-modal">Cancel</button>
          <button class="btn btn-gold" id="save-item" type="submit">Save Item</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js?v=20260410a"></script>
  <script src="./auth.js"></script>
  <script>
    const state = {
      items: [],
      filter: 'All',
      bools: { isVeg: false, isChef: false, isAvailable: true }
    };

    const categories = ['All', 'North Indian', 'South Indian', 'Seafood', 'Starters', 'Desserts', 'Cocktails', 'Mocktails', 'Bar'];

    function setupTabs() {
      const wrap = document.getElementById('category-tabs');
      wrap.innerHTML = categories.map((c) => '<button class="tab' + (c === state.filter ? ' active' : '') + '" data-cat="' + c + '">' + c + '</button>').join('');
      wrap.querySelectorAll('.tab').forEach((tab) => {
        tab.addEventListener('click', () => {
          state.filter = tab.dataset.cat;
          setupTabs();
          renderTable();
        });
      });
    }

    function renderTable() {
      const tbody = document.getElementById('menu-table');
      const rows = state.items.filter((i) => state.filter === 'All' || i.category === state.filter);
      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty">📭 No data yet</td></tr>';
        return;
      }

      tbody.innerHTML = rows.map((item) => {
        const vegDot = item.is_vegetarian ? '<span style="color:#22c55e">●</span>' : '<span style="color:#ef4444">●</span>';
        return '<tr>' +
          '<td>' + (item.image_url ? '<img src="' + item.image_url + '" alt="' + item.name + '" style="width:48px;height:48px;border-radius:0.45rem;object-fit:cover;">' : '-') + '</td>' +
          '<td>' + (item.name || '-') + '</td>' +
          '<td>' + (item.category || '-') + '</td>' +
          '<td>₹' + (item.price || 0) + '</td>' +
          '<td>' + vegDot + '</td>' +
          '<td><button class="switch ' + (item.is_available ? 'active' : '') + '" data-switch="' + item.id + '"></button></td>' +
          '<td><button class="btn-icon" data-edit="' + item.id + '">✎</button><button class="btn-icon" data-delete="' + item.id + '">🗑</button></td>' +
          '</tr>';
      }).join('');

      tbody.querySelectorAll('[data-switch]').forEach((el) => {
        el.addEventListener('click', async () => {
          const id = el.dataset.switch;
          const item = state.items.find((i) => String(i.id) === String(id));
          if (!item) return;
          const { error } = await window.AdminAuth.supabase.from('menu_items').update({ is_available: !item.is_available }).eq('id', id);
          if (error) return window.AdminAuth.toast(error.message, 'error', false);
          window.AdminAuth.toast('Availability updated');
          await loadItems();
        });
      });

      tbody.querySelectorAll('[data-edit]').forEach((el) => el.addEventListener('click', () => openModal(el.dataset.edit)));
      tbody.querySelectorAll('[data-delete]').forEach((el) => el.addEventListener('click', () => deleteItem(el.dataset.delete)));
    }

    async function loadItems() {
      const { data, error } = await window.AdminAuth.supabase.from('menu_items').select('*').order('category').order('name');
      if (error) {
        window.AdminAuth.toast(error.message, 'error', false);
        return;
      }
      state.items = data || [];
      renderTable();
    }

    function setSwitches() {
      document.querySelector('[data-toggle="is-veg"]').classList.toggle('active', state.bools.isVeg);
      document.querySelector('[data-toggle="is-chef"]').classList.toggle('active', state.bools.isChef);
      document.querySelector('[data-toggle="is-available"]').classList.toggle('active', state.bools.isAvailable);
    }

    function resetForm() {
      document.getElementById('item-form').reset();
      document.getElementById('item-id').value = '';
      state.bools = { isVeg: false, isChef: false, isAvailable: true };
      setSwitches();
    }

    function openModal(id) {
      const modal = document.getElementById('item-modal');
      resetForm();
      if (id) {
        const item = state.items.find((i) => String(i.id) === String(id));
        if (item) {
          document.getElementById('modal-title').textContent = 'Edit Item';
          document.getElementById('item-id').value = item.id;
          document.getElementById('dish-name').value = item.name || '';
          document.getElementById('dish-category').value = item.category || 'North Indian';
          document.getElementById('dish-price').value = item.price || 0;
          document.getElementById('dish-description').value = item.description || '';
          state.bools = {
            isVeg: !!item.is_vegetarian,
            isChef: !!item.is_chefs_special,
            isAvailable: !!item.is_available
          };
          setSwitches();
        }
      } else {
        document.getElementById('modal-title').textContent = 'Add Item';
      }
      modal.classList.add('open');
    }

    function closeModal() {
      document.getElementById('item-modal').classList.remove('open');
    }

    async function uploadImage(file) {
      if (!file) return null;
      const ext = file.name.split('.').pop();
      const fileName = 'menu-' + Date.now() + '-' + Math.random().toString(16).slice(2) + '.' + ext;
      const { error } = await window.AdminAuth.supabase.storage.from('menu-images').upload(fileName, file, { upsert: true });
      if (error) throw error;
      const { data } = window.AdminAuth.supabase.storage.from('menu-images').getPublicUrl(fileName);
      return data.publicUrl;
    }

    async function saveItem(e) {
      e.preventDefault();
      const btn = document.getElementById('save-item');
      window.AdminAuth.setBusy(btn, true, 'Save Item');

      try {
        const id = document.getElementById('item-id').value;
        const imageFile = document.getElementById('dish-image').files[0];
        let imageUrl = null;
        if (imageFile) imageUrl = await uploadImage(imageFile);

        const payload = {
          name: document.getElementById('dish-name').value.trim(),
          category: document.getElementById('dish-category').value,
          price: Number(document.getElementById('dish-price').value || 0),
          description: document.getElementById('dish-description').value.trim(),
          is_vegetarian: state.bools.isVeg,
          is_chefs_special: state.bools.isChef,
          is_available: state.bools.isAvailable
        };

        if (imageUrl) payload.image_url = imageUrl;

        let error;
        if (id) {
          ({ error } = await window.AdminAuth.supabase.from('menu_items').update(payload).eq('id', id));
        } else {
          ({ error } = await window.AdminAuth.supabase.from('menu_items').insert(payload));
        }

        if (error) throw error;

        window.AdminAuth.toast('Menu item saved');
        closeModal();
        await loadItems();
      } catch (err) {
        window.AdminAuth.toast(err.message || 'Failed to save item', 'error', false);
      } finally {
        window.AdminAuth.setBusy(btn, false, 'Save Item');
      }
    }

    async function deleteItem(id) {
      if (!window.AdminAuth.confirmDanger()) return;
      const { error } = await window.AdminAuth.supabase.from('menu_items').delete().eq('id', id);
      if (error) return window.AdminAuth.toast(error.message, 'error', false);
      window.AdminAuth.toast('Item deleted');
      await loadItems();
    }

    window.addEventListener('DOMContentLoaded', async () => {
      await window.AdminAuth.requireAuth();
      setupTabs();
      await loadItems();

      document.getElementById('add-item').addEventListener('click', () => openModal(''));
      document.getElementById('close-modal').addEventListener('click', closeModal);
      document.getElementById('cancel-modal').addEventListener('click', closeModal);
      document.getElementById('item-form').addEventListener('submit', saveItem);

      document.querySelector('[data-toggle="is-veg"]').addEventListener('click', () => { state.bools.isVeg = !state.bools.isVeg; setSwitches(); });
      document.querySelector('[data-toggle="is-chef"]').addEventListener('click', () => { state.bools.isChef = !state.bools.isChef; setSwitches(); });
      document.querySelector('[data-toggle="is-available"]').addEventListener('click', () => { state.bools.isAvailable = !state.bools.isAvailable; setSwitches(); });
    });
  </script>
</body>
</html>
